name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Release Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: pnpm

      - name: Install
        run: corepack pnpm install --frozen-lockfile

      - name: Check Whitespace
        run: git diff --check

      - name: Verify
        run: corepack pnpm verify

      - name: Check Generated Files
        run: git diff --exit-code

      - name: Agent Surface E2E
        run: corepack pnpm test:e2e:agent-surface

      - name: Package Dry Run
        run: corepack pnpm pack:dry-run
